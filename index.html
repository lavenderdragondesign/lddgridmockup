<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LavenderDragonDesign's Grid Mockup Generator</title>
    <meta name="description" content="An advanced tool to create stunning visual mockups by arranging images in various grid layouts. Customize spacing, zoom, text overlays, and export your creations as high-quality PNGs." />
    <style>
      body {
        background-color: #f3f4f6; /* bg-gray-100 */
        color: #1f2937; /* text-gray-800 */
      }
      .dark body {
        background-color: #030712; /* bg-gray-950 */
        color: #f9fafb; /* text-gray-50 */
      }
    </style>
    <script>
      // Prevent FOUC for dark mode
      if (localStorage.getItem('grid-mockup-theme') === 'dark' || (!('grid-mockup-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
